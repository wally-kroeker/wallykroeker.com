# Allow native build scripts for packages that need them.
# @playwright/browser-* are intentionally excluded — browsers are installed
# by the explicit `pnpm exec playwright install --with-deps` CI step, not
# here. Running both causes a parallel-download lockfile conflict.

# pnpm v10
onlyBuiltDependencies:
  - esbuild
  - protobufjs
  - unrs-resolver

# pnpm v11+
allowBuilds:
  esbuild: true
  protobufjs: true
  unrs-resolver: true
