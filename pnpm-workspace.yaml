# pnpm build-script policy.
# Browsers are explicitly denied here — they would race on Playwright's
# cache lockfile if all three ran concurrently during pnpm install.
# The CI workflow's `playwright install --with-deps` step handles them.

# pnpm v10: only listed packages may run install scripts
onlyBuiltDependencies:
  - esbuild
  - protobufjs
  - unrs-resolver

# pnpm v11+: every package with build scripts must be explicitly allow/deny
allowBuilds:
  "@playwright/browser-chromium": false
  "@playwright/browser-firefox": false
  "@playwright/browser-webkit": false
  esbuild: true
  protobufjs: true
  unrs-resolver: true
